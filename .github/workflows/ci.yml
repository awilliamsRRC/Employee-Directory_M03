name: Node.js CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v2
            
            # Set up Node.js version 14
            - name: Use Node.js
              uses: actions/setup-node@v2
              with:
                  node-version: "14"
            
            # Set Firebase credentials as environment variables
            - name: Set up Firebase Credentials
              run: |
                echo "FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}" >> $GITHUB_ENV
                echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> $GITHUB_ENV
                echo "FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}" >> $GITHUB_ENV

            # Install dependencies
            - run: npm install

            # Run tests
            - run: npm test
